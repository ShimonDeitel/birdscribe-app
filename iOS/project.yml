name: Birdscribe
options:
  bundleIdPrefix: com.shimondeitel.birdscribe
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Birdscribe:
    type: application
    platform: iOS
    sources:
      - path: Birdscribe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.birdscribe
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Birdscribe/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BirdscribeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BirdscribeTests
      - path: Birdscribe.storekit
    dependencies:
      - target: Birdscribe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.birdscribe.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BirdscribeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BirdscribeUITests
    dependencies:
      - target: Birdscribe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.birdscribe.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Birdscribe:
    build:
      targets:
        Birdscribe: all
        BirdscribeTests: [test]
        BirdscribeUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Birdscribe.storekit
    test:
      config: Debug
      storeKitConfiguration: Birdscribe.storekit
      targets:
        - BirdscribeTests
        - BirdscribeUITests
    archive:
      config: Release
